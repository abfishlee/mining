<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>필기 핵심요약본 뷰어</title>
<style>
:root{--bg-color:#0f172a;--surface-color:rgba(30,41,59,.7);--text-main:#f8fafc;--text-muted:#94a3b8;--accent:#3b82f6;--glass-border:rgba(255,255,255,.1)}
body{font-family:'Inter',sans-serif;background:var(--bg-color);color:var(--text-main);margin:0;padding-bottom:90px}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(15,23,42,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--glass-border)}
.topbar a{color:var(--text-muted);text-decoration:none;font-size:.9rem}
.topbar h1{font-size:1rem;margin:0;flex:1}
.jump{background:var(--surface-color);color:var(--text-main);border:1px solid var(--glass-border);border-radius:8px;padding:6px 10px;font-size:.9rem}
.pages{max-width:1100px;margin:0 auto;padding:16px}
.pageimg{width:100%;border-radius:10px;margin-bottom:18px;background:#fff;display:block;min-height:200px}
.plabel{color:var(--text-muted);font-size:.8rem;margin:0 0 6px 4px}
.navbtns{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px;background:rgba(15,23,42,.95);border-top:1px solid var(--glass-border)}
.navbtns button{flex:1;padding:14px;border-radius:10px;border:1px solid var(--glass-border);background:var(--surface-color);color:var(--text-main);font-size:1rem}
.navbtns button:active{background:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <a href="written.html">← 필기 홈</a>
  <h1>핵심요약본 (전체 19p)</h1>
  <select class="jump" id="jump" aria-label="목차 이동">
    <option value="1">표지·목차</option>
    <option value="3">1과목 분석기획</option>
    <option value="7">2과목 탐색</option>
    <option value="12">3과목 모델링</option>
    <option value="16">4과목 결과해석</option>
  </select>
</div>
<div class="pages" id="pages"></div>
<div class="navbtns">
  <button id="prev">◀ 이전 페이지</button>
  <button id="next">다음 페이지 ▶</button>
</div>
<script>
var TOTAL = 19;
var pagesEl = document.getElementById('pages');
for (var i = 1; i <= TOTAL; i++) {
  var num = (i < 10 ? '0' : '') + i;
  var label = document.createElement('p');
  label.className = 'plabel'; label.textContent = 'p.' + i + ' / ' + TOTAL;
  var img = document.createElement('img');
  img.className = 'pageimg'; img.loading = 'lazy'; img.id = 'p' + i;
  img.src = 'written/summary/page-' + num + '.jpg';
  img.alt = '핵심요약본 ' + i + '페이지';
  pagesEl.appendChild(label); pagesEl.appendChild(img);
}
function currentPage(){
  var imgs = document.querySelectorAll('.pageimg');
  for (var i = 0; i < imgs.length; i++) {
    var r = imgs[i].getBoundingClientRect();
    if (r.bottom > 120) return i + 1;
  }
  return TOTAL;
}
function goTo(p){
  p = Math.max(1, Math.min(TOTAL, p));
  var el = document.getElementById('p' + p);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
document.getElementById('prev').addEventListener('click', function(){ goTo(currentPage() - 1); });
document.getElementById('next').addEventListener('click', function(){ goTo(currentPage() + 1); });
document.getElementById('jump').addEventListener('change', function(e){ goTo(parseInt(e.target.value, 10)); });
</script>
</body>
</html>
